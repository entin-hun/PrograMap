services:
  backend:
    # Production image is pulled from GHCR (built by .github/workflows/build-and-push.yml).
    # GHCR lowercases the repo name ("PrograMap" -> "programap"). For local
    # development, run `docker compose build` and the image will be tagged with
    # the same name and used in place of a pull.
    image: ghcr.io/entin-hun/programap-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8269:8223"
    env_file:
      - ./backend/.env
    volumes:
      - ${REMOTE_BACKEND_ATTACH_DIR:-./backend}/.env:/app/.env:ro
      # Mount service account credentials (not tracked in git)
      - ${REMOTE_BACKEND_ATTACH_DIR:-./backend}/key.json:/app/key.json:ro
      - ${REMOTE_BACKEND_ATTACH_DIR:-./backend}/cop.json:/app/cop.json:ro
      # Persist SQLite database
      - trail_planner_db:/app/data
    environment:
      - APP_DB_PATH=/app/data/trail_planner.db
      - EE_PRIVATE_KEY_PATH=/app/key.json
    restart: unless-stopped

  frontend:
    # Production image is pulled from GHCR (built by .github/workflows/build-and-push.yml).
    # GHCR lowercases the repo name ("PrograMap" -> "programap"). For local
    # development, run `docker compose build` and the image will be tagged with
    # the same name and used in place of a pull.
    image: ghcr.io/entin-hun/programap-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8084:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  trail_planner_db:
