name: Build and push to GHCR (and Zot mirror)

# Builds the backend and frontend Docker images and pushes them to
# GitHub Container Registry (ghcr.io/entin-hun/programap-{backend,frontend}).
# After the push, the GHCR packages are flipped to public so the NAS can
# `docker compose pull` without a token. As a fallback, the same images
# are also pushed to the user's local Zot registry at
# 100.64.152.116:5000 (reachable from the user's network, NOT from the
# GHA runner — see `push-to-zot` job for the mirror path).
# Note: GHCR lowercases image names, so the repo name "PrograMap" becomes
# "programap" in the published image. Images are tagged with:
#   - latest   (default branch)
#   - <branch> (other branches)
#   - <sha>    (short commit SHA, useful for pinned deploys)
#   - <tag>    (semver git tags, e.g. v1.2.3)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: entin-hun
  BACKEND_IMAGE: programap-backend
  FRONTEND_IMAGE: programap-frontend
  ZOT_REGISTRY: 100.64.152.116:5000

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Flip the package visibility to public so the NAS can `docker compose pull`
      # without a token. Tries the user-level endpoint first, then the
      # /users/<owner>/ variant (the latter is sometimes needed when the
      # GITHUB_TOKEN's user-identity is in a different scope).
      - name: Make GHCR packages public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ env.OWNER }}
        run: |
          set +e
          for pkg in "${{ env.BACKEND_IMAGE }}" "${{ env.FRONTEND_IMAGE }}"; do
            echo "Setting $pkg to public..."
            ok=0
            for url in \
              "https://api.github.com/user/packages/container/$pkg" \
              "https://api.github.com/users/$OWNER/packages/container/$pkg"; do
              http_code=$(curl -sS -o /tmp/pkg-resp.json -w "%{http_code}" \
                -X PATCH \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$url" \
                -d '{"visibility":"public"}')
              echo "  PATCH $url -> HTTP $http_code"
              if [ "$http_code" = "200" ]; then
                ok=1
                break
              fi
            done
            if [ "$ok" = "0" ]; then
              echo "  !! $pkg could not be set to public via API."
              echo "     Falling back: please set it manually at"
              echo "     https://github.com/users/$OWNER/packages/container/$pkg/settings"
              cat /tmp/pkg-resp.json
            fi
          done

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### Images pushed to GHCR (public)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.BACKEND_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.FRONTEND_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags: \`${{ steps.meta-backend.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
