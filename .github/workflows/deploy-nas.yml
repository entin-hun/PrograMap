name: Deploy NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
      TAILSCALE_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_PORT: ${{ secrets.NAS_PORT }}
      NAS_USER: ${{ secrets.NAS_USER }}
      NAS_SSH_PRIVATE_KEY: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
      REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
      REMOTE_BACKEND_ATTACH_DIR: ${{ secrets.REMOTE_BACKEND_ATTACH_DIR }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          missing=0
          for var in TAILSCALE_OAUTH_CLIENT_ID TAILSCALE_OAUTH_SECRET NAS_HOST NAS_USER NAS_SSH_PRIVATE_KEY REMOTE_APP_DIR; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$NAS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${NAS_PORT:-8372}" "$NAS_HOST" >> ~/.ssh/known_hosts

      - name: Sync repository to NAS
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude 'backend/.env' \
            --exclude 'backend/key.json' \
            --exclude 'backend/cop.json' \
            ./ "${NAS_USER}@${NAS_HOST}:${REMOTE_APP_DIR}/"

      - name: Deploy on NAS
        shell: bash
        run: |
          remote_attach_dir="${REMOTE_BACKEND_ATTACH_DIR:-${REMOTE_APP_DIR}/backend}"
          ssh -p "${NAS_PORT:-8372}" "${NAS_USER}@${NAS_HOST}" "cd '${REMOTE_APP_DIR}' && chmod +x scripts/deploy-nas.sh && REMOTE_BACKEND_ATTACH_DIR='${remote_attach_dir}' bash scripts/deploy-nas.sh"
